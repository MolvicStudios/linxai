<!DOCTYPE html>
<html lang="es" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LinxAI — Asistente IA para aprender Linux</title>
  <meta name="description" content="Tu asistente inteligente para migrar de Windows a Linux. Chat IA, traducción de comandos y guías interactivas para Ubuntu, Mint, Arch y Manjaro.">
  <meta name="keywords" content="linux asistente ia, aprender linux, migrar windows linux, ubuntu principiantes, arch linux guia, comandos linux">
  <meta name="author" content="MolvicStudios">
  <link rel="canonical" href="https://linxai.quest/">

  <!-- Open Graph -->
  <meta property="og:title" content="LinxAI — Tu guía en Linux">
  <meta property="og:description" content="Asistente IA para aprender Linux. Chat, comandos y guías para Ubuntu, Mint, Arch y Manjaro.">
  <meta property="og:url" content="https://linxai.quest/">
  <meta property="og:type" content="website">
  <meta property="og:image" content="https://linxai.quest/icons/og-image.png">

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#00FF88">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <link rel="icon" href="/icons/favicon.svg" type="image/svg+xml">

  <!-- Preconnect -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://api.groq.com">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="/css/tokens.css">
  <link rel="stylesheet" href="/css/reset.css">
  <link rel="stylesheet" href="/css/layout.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/chat.css">
  <link rel="stylesheet" href="/css/terminal.css">
  <link rel="stylesheet" href="/css/guide.css">
  <link rel="stylesheet" href="/css/onboarding.css">
  <link rel="stylesheet" href="/css/dark.css">
</head>
<body>
  <div id="app" class="app">

    <!-- SIDEBAR -->
    <aside id="sidebar" class="sidebar">
      <div class="sidebar__header">
        <div class="sidebar__logo">
          <img src="/icons/linxai-logo.svg" alt="LinxAI" style="width:160px; height:auto; display:block;">
        </div>
        <button id="btn-sidebar-close" class="btn-icon sidebar__close" aria-label="Close sidebar">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>

      <nav class="sidebar__nav">
        <button class="nav-btn nav-btn--active" data-mode="chat">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          <span data-i18n="mode_chat">Chat</span>
        </button>
        <button class="nav-btn" data-mode="terminal">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
          <span data-i18n="mode_terminal">Terminal</span>
        </button>
        <button class="nav-btn" data-mode="guide">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
          <span data-i18n="mode_guide">Guía</span>
        </button>
      </nav>

      <div class="sidebar__divider"></div>

      <!-- History -->
      <div class="sidebar__history">
        <div class="sidebar__history-header">
          <span data-i18n="history_title">Historial</span>
          <button id="btn-new-session" class="btn-icon" title="Nueva sesión">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          </button>
        </div>
        <div id="history-list" class="history-list"></div>
      </div>

      <div class="sidebar__footer">
        <button id="btn-settings" class="nav-btn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          <span data-i18n="settings">Ajustes</span>
        </button>
        <button id="btn-install-pwa" class="nav-btn" style="display:none">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          <span data-i18n="install_pwa">Instalar app</span>
        </button>
      </div>
    </aside>

    <!-- MAIN PANEL -->
    <main id="main-panel" class="main-panel">

      <!-- Header -->
      <header class="main-header">
        <button id="btn-sidebar-open" class="btn-icon main-header__menu" aria-label="Open sidebar">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <div class="main-header__mode">
          <span id="header-mode-label" data-i18n="mode_chat">Chat</span>
        </div>
        <div class="main-header__badges">
          <span id="badge-distro" class="badge badge--distro">Ubuntu</span>
          <button id="btn-lang-toggle" class="badge badge--lang">ES</button>
        </div>
      </header>

      <!-- Content views -->
      <div id="view-chat" class="view view--active">
        <div id="chat-messages" class="chat-messages"></div>
      </div>

      <div id="view-terminal" class="view">
        <div id="terminal-results" class="terminal-results"></div>
      </div>

      <div id="view-guide" class="view">
        <div id="guide-content" class="guide-content"></div>
      </div>

      <!-- Input bar -->
      <div id="input-bar" class="input-bar">
        <textarea id="chat-input" rows="1" data-i18n-placeholder="chat_placeholder" placeholder="Pregunta algo sobre Linux..."></textarea>
        <button id="btn-send" class="btn-send" disabled aria-label="Send">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>

    </main>

    <!-- MOBILE BOTTOM NAV -->
    <nav id="mobile-nav" class="mobile-nav">
      <button class="mobile-nav__btn mobile-nav__btn--active" data-mode="chat">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        <span data-i18n="mode_chat">Chat</span>
      </button>
      <button class="mobile-nav__btn" data-mode="terminal">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
        <span data-i18n="mode_terminal">Terminal</span>
      </button>
      <button class="mobile-nav__btn" data-mode="guide">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
        <span data-i18n="mode_guide">Guía</span>
      </button>
      <button class="mobile-nav__btn" id="btn-mobile-menu">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        <span>Menu</span>
      </button>
    </nav>

    <!-- SETTINGS PANEL (hidden by default) -->
    <div id="settings-panel" class="settings-panel" hidden>
      <div class="settings-panel__backdrop"></div>
      <div class="settings-panel__content">
        <div class="settings-panel__header">
          <h2 data-i18n="settings">Ajustes</h2>
          <button id="btn-settings-close" class="btn-icon" aria-label="Close">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
        <div class="settings-panel__body">
          <!-- Distribution -->
          <div class="settings-group">
            <label class="settings-label" data-i18n="settings_distro">Distribución</label>
            <select id="settings-distro" class="settings-select">
              <option value="ubuntu">Ubuntu / Linux Mint</option>
              <option value="arch">Arch Linux / Manjaro</option>
            </select>
          </div>
          <!-- Level -->
          <div class="settings-group">
            <label class="settings-label" data-i18n="settings_level">Nivel</label>
            <select id="settings-level" class="settings-select">
              <option value="beginner" data-i18n="level_beginner">Principiante</option>
              <option value="intermediate" data-i18n="level_intermediate">Intermedio</option>
              <option value="advanced" data-i18n="level_advanced">Avanzado</option>
            </select>
          </div>
          <!-- Language -->
          <div class="settings-group">
            <label class="settings-label" data-i18n="settings_lang">Idioma</label>
            <div class="settings-lang-toggle">
              <button class="lang-btn lang-btn--active" data-lang="es">ES</button>
              <button class="lang-btn" data-lang="en">EN</button>
            </div>
          </div>
          <!-- API Key -->
          <div class="settings-group">
            <label class="settings-label">API Key (Groq)</label>
            <div class="settings-api">
              <label class="radio-label">
                <input type="radio" name="api-mode" value="shared">
                <span data-i18n="api_shared">Usar clave del proyecto (limitada)</span>
              </label>
              <label class="radio-label">
                <input type="radio" name="api-mode" value="personal">
                <span data-i18n="api_personal">Usar mi propia clave</span>
              </label>
              <div id="api-key-input-group" class="api-key-group" hidden>
                <input type="password" id="settings-api-key" class="settings-input" placeholder="gsk_...">
                <button id="btn-save-api-key" class="btn-sm" data-i18n="save">Guardar</button>
              </div>
            </div>
          </div>
          <!-- Theme -->
          <div class="settings-group">
            <label class="settings-label" data-i18n="settings_theme">Tema</label>
            <select id="settings-theme" class="settings-select" disabled>
              <option value="dark" data-i18n="theme_dark">Oscuro</option>
            </select>
          </div>
          <!-- Data -->
          <div class="settings-group">
            <label class="settings-label" data-i18n="settings_data">Datos</label>
            <div class="settings-actions">
              <button id="btn-clear-history" class="btn-sm btn-sm--danger" data-i18n="clear_history">Borrar historial</button>
              <button id="btn-reset-all" class="btn-sm btn-sm--danger" data-i18n="reset_all">Resetear todo</button>
            </div>
          </div>
          <div class="settings-footer">
            <span>v1.0.0 · <a href="https://linxai.quest" target="_blank" rel="noopener">linxai.quest</a></span>
          </div>
        </div>
      </div>
    </div>

    <!-- ONBOARDING OVERLAY -->
    <div id="onboarding" class="onboarding" hidden>
      <div class="onboarding__backdrop"></div>
      <div class="onboarding__card">
        <!-- Steps rendered by onboarding.js -->
      </div>
    </div>

  </div>

  <!-- App scripts -->
  <script type="module" src="/js/app.js"></script>
</body>
</html>
